openapi: 3.0.3
info:
  title: MergeFlow API - Test MergeFlow Step 7 release summary email
  version: 1.0.0
  description: This API provides user authentication functionality, including a new `remember_me` option for generating longer-lived tokens.
paths:
  /login:
    post:
      summary: Log in with email and password
      description: Validate credentials and return a bearer token for authenticated users.
      tags:
        - auth
      requestBody:
        description: User credentials for login.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              rememberMeTrue:
                summary: Login with remember_me true
                value:
                  email: admin@example.com
                  password: correct-horse-battery-staple
                  remember_me: true
              rememberMeFalse:
                summary: Login with remember_me false
                value:
                  email: admin@example.com
                  password: correct-horse-battery-staple
                  remember_me: false
              rememberMeOmitted:
                summary: Login with remember_me omitted
                value:
                  email: admin@example.com
                  password: correct-horse-battery-staple
      responses:
        '200':
          description: Successful authentication, returns a bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                longLivedToken:
                  summary: Successful login with remember_me true
                  value:
                    token: mergeflow-test-long-lived-token-for-admin-user
                    token_type: bearer
                sessionToken:
                  summary: Successful login with remember_me false or omitted
                  value:
                    token: mergeflow-test-session-token-for-admin-user
                    token_type: bearer
        '400':
          description: The request body is missing required fields or contains invalid values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing email or password
                  value:
                    detail: Email and password are required.
                invalidFields:
                  summary: Invalid email format or password too short
                  value:
                    detail: Email and password are required and must be valid.
        '401':
          description: The supplied email and password do not match a known user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  summary: Invalid email or password
                  value:
                    detail: Invalid email or password.
components:
  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address for the account attempting to log in.
          example: admin@example.com
        password:
          type: string
          minLength: 8
          description: Plain text password submitted by the user.
          example: correct-horse-battery-staple
        remember_me:
          type: boolean
          default: false
          description: When true, issue a longer-lived session token for trusted devices.
          example: false
      required:
        - email
        - password
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Bearer token returned after successful authentication.
          example: mergeflow-test-long-lived-token-for-admin-user
        token_type:
          type: string
          default: bearer
          description: Token type clients should use in the Authorization header.
          example: bearer
      required:
        - token
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error explaining why login failed.
          example: Email and password are required.
      required:
        - detail
x-mergeflow-env-vars:
  AUTH_TOKEN_ISSUER:
    description: Used to prefix the generated authentication token. Defaults to "mergeflow-test" if not set.
    default: mergeflow-test
