openapi: 3.0.3
info:
  title: Test MergeFlow Step 7 release email (logout endpoint)
  version: 1.0.0
  description: |
    This PR introduces a new API endpoint for user logout, `/logout`, within the authentication module. It allows clients to invalidate a session token by providing it in the request body.

    Key changes include:
    *   **New Endpoint**: A `POST /logout` endpoint has been added.
    *   **New Schemas**: `LogoutRequest` and `LogoutResponse` Pydantic models have been defined to handle the request and response bodies for the logout operation.
    *   **New Service Function**: A `revoke_session` function has been added to handle the token invalidation logic. Currently, this function provides a basic implementation that accepts any non-empty token as successfully "revoked".

    The endpoint definition, request body, and response schemas are structured for OpenAPI/Swagger specification. The `summary`, `description`, `example` fields, and `default` values are provided and directly mapped. The `tags` array is set to `["auth"]`. The `responses` object correctly defines `200` and `400` status codes with their respective models and descriptions. The `ErrorResponse` schema is generic and can be reused for other error scenarios.
paths:
  /logout:
    post:
      summary: Log out and revoke the current session token
      tags:
        - auth
      description: |
        Invalidate the supplied bearer token for the current session.
        Note: The current implementation of token revocation is simplified for demonstration purposes and only checks for a non-empty token string, not its authenticity or prior issuance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            examples:
              default:
                value:
                  token: mergeflow-test-session-token-for-admin-user
      responses:
        '200':
          description: Session revoked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              examples:
                default:
                  value:
                    success: true
                    message: Session revoked successfully.
        '400':
          description: The request body is missing a token or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingToken:
                  summary: Missing request body or token field
                  value:
                    detail: Token is required.
                invalidToken:
                  summary: Invalid token format or type
                  value:
                    detail: Token is required and must be valid.
components:
  schemas:
    LogoutRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Bearer token to invalidate for the current session.
          example: mergeflow-test-session-token-for-admin-user
    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          default: true
          description: Whether the logout request was accepted.
          example: true
        message:
          type: string
          default: Session revoked successfully.
          description: Human-readable logout confirmation.
          example: Session revoked successfully.
    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Human-readable error explaining why the request failed.
          example: Token is required.
